    name: "DP1"
    ntapes: 60
    r: [150.0, 154.0]
    z: [0.0, 24.0]
  - !<DoublePancake>
    name: "DP2"
    ntapes: 60
    r: [150.0, 154.0]
    z: [26.0, 50.0]

