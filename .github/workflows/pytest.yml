name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run pytest
      run: |
        pytest --cov=python_magnetgeo --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  test-debian:
    runs-on: ubuntu-24.04
    container:
      image: debian:stable
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y python${{ matrix.python-version }} python3-pip git

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python${{ matrix.python-version }} -m pip install --upgrade pip --break-system-packages
        python${{ matrix.python-version }} -m pip install -e ".[dev]" --break-system-packages

    - name: Run pytest
      run: |
        python${{ matrix.python-version }} -m pytest --cov=python_magnetgeo --cov-report=xml --cov-report=term
